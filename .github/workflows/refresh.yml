name: Generate Google Shopping Sessions

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: session-pool
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install seleniumbase

      - run: python refresh.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: |
          git add session_pool.json
          git diff --cached --quiet || git commit -m "Update session pool"
      - run: |
          for i in {1..5}; do
            git pull --rebase origin main
            git push --force-with-lease origin main && break
            sleep 2
          done
